services:
  api:
    build: .
    container_name: digit_api

    ports:
      - "8000:8000"

    volumes:
      - .:/backend

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:16

    container_name: digit_postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: digit_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: